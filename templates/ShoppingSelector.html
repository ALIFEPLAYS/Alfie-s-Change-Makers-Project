<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 10; box-sizing: border-box; }

        body { 
            font-family: Arial, sans-serif;
            background-image: url("sunbackground.png");
            background-size: cover;
            background-attachment: fixed;
             }

        header { 
            background-color: #0066cc;
            color: white; 
            padding: 20px; 
            display: flex;
            justify-content: center;
            align-items: center; }

        header h1 { 
            font-size: 28px; 
            position: relative;}

        .basket-link {
            display: inline-block; /* allow positioning like the div */
            text-decoration: none; /* remove underline */
            color: inherit; /* keep text colour inside */
            position: relative; 
            width: 180px;
            top: 10px; 
            left: 45%;

        }
        .basket-icon { 

            display: flex; 
            flex-direction: row;
            align-items: center ;
            background-color: rgb(200, 200, 200); 
            border: 1px solid #000; 
            padding: 10px;
            flex-wrap: wrap;
            display:flex;
            gap: 20px;
            border-radius: 10px;
            box-shadow: 0 1px 3px rgba(0,0,0);
        } 

        .basket-icon-inner {
            position:relative;
            display:flex;
            }
        
        .basket-icon-inner img{
            display: block;
            max-width: 100%;
            height: 20px;
            margin-right: 10px;
        }    
        .basket-icon-inner p {
            color:#000000; 
            font-size: 18px; 
            text-align: center;}
        
        .basket-icon-inner span {
            color: #000000;
            font-size: 18px;
            text-align: center;
        }

        .Item-boxes {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            gap: 20px;
            margin: 62px 10px;
            width: 100%;
        }

        .ItemHH {
            background-color:white;
            border: 5px solid red;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
            justify-content: center;
            align-items: center;
            display:flex;
            flex-direction: column;
            height: 400px;
            width: 400px;
        }

        .ItemHH:hover {
            background-color: red;
            color: white; /* change text color on hover */
            transition : background-color 0.7s; /* add a fade effect */
        }

        .ItemHH:hover h2, .ItemT:hover h2, .ItemP:hover h2 {
            color: white; /* ensure heading inherits hover color */
            transition: color 0.5s;
        }

        /* also apply hover effect for other item types */
        .ItemT:hover {
            background-color: rgb(1, 88, 8);
            color: white;
            transition : background-color 0.7s;
        }

        .ItemP:hover {
            background-color: rgb(148, 20, 162);
            color: white;
            transition : background-color 0.7s;
        }
        .ItemHH h2 {
            font-size: 36px;
            color:#000000;
        }

        .ItemHH img {
            display: block;
            max-width: 300px;
            height: auto;
            margin-top: 20px;
            position: relative;
        }

        .ItemT {
            background-color:white;
            border: 5px solid rgb(1, 88, 8);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
            justify-content: center;
            align-items: center;
            display:flex;
            flex-direction: column;
            height: 400px;
            width: 400px;
        }

        .ItemT h2 {
            font-size: 36px;
            color:#000000;
        }

        .ItemT img {
            display: block;
            max-width: 300px;
            height: auto;
            margin-top: 20px;
        }

        .ItemP {
            background-color:white;
            border: 5px solid rgb(148, 20, 162);
            box-shadow: 0 5px 8px rgba(148, 20, 162, 0.1);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
            justify-content: center;
            align-items: center;
            display:flex;
            flex-direction: column;
            height: 400px;
            width: 400px;
        }

        .ItemP h2 {
            font-size: 36px;
            color:#000000;
        }

        .ItemP img {
            display: block;
            max-width: 300px;
            height: auto;
            margin-top: 20px;
        }
        .footer {
            background-color: #f1f1f1; padding: 20px; text-align: center; color: #333; border-top: 1px solid #ccc; margin-top: 40px;
        }

        .itemHH-link, .itemT-link, .itemP-link {
            text-decoration: none;
            color: inherit;
        }
    </style>

</head>
<body>
    <header>
        <h1>Climate Clear Shopping Calculator</h1>
    </header>

    <a href="basket.html" class="basket-link">
        <div class="basket-icon">
            <div class="basket-icon-inner">
              <img src="basket.png">
              <p>Your Basket:</p>
              <span id="basket-count">0</span>
            </div>
        </div>
    </a>


    <div class="Item-boxes">
        <a href="Household.html" class="itemHH-link">
        <div class="ItemHH">
            <h2>washing & cleaning</h2>
            <img src="HHimg.png">
        </div>
        </a>
        <a href="toiletries.html" class="itemT-link">
        <div class="ItemT">
            <h2>Toiletries</h2>
            <img src="Timg.png">
        </div>
        </a>
        <a href="Pets.html" class="itemP-link">
        <div class="ItemP">
            <h2>Pets</h2>
            <img src="Pimg.png">
        </div>
        </a>
    </div>

    <footer class="footer">
        <p>Contact</p>
        <p>Address: Exhibition Road, South Kensington, London SW7 2AZ</p>
    </footer>

<script src="Optimiserjava.js"></script>

</body>
</html>
